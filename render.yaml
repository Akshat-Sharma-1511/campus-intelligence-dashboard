services:
  # ── Unified Campus MCP Server (all 4 services in one) ────────
  - type: web
    name: campus-mcp-unified
    runtime: python
    rootDir: unified-server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
